name: Release Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  IMAGE_NAME: carlocgc/weighttracker
  ARTIFACT_RUNTIME: linux-x64

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tags must match vX.Y.Z, for example v1.2.3."
            exit 1
          fi

          git fetch --no-tags origin master:refs/remotes/origin/master

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" refs/remotes/origin/master; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit contained in origin/master."
            exit 1
          fi

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore app
        run: dotnet restore ./src/WeightTracker.Web/WeightTracker.Web.csproj

      - name: Restore tests
        run: dotnet restore ./tests/WeightTracker.Tests/WeightTracker.Tests.csproj

      - name: Build app
        run: dotnet build ./src/WeightTracker.Web/WeightTracker.Web.csproj --configuration Release --no-restore

      - name: Build tests
        run: dotnet build ./tests/WeightTracker.Tests/WeightTracker.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ./tests/WeightTracker.Tests/WeightTracker.Tests.csproj --configuration Release --no-build

      - name: Publish app artifact
        shell: bash
        run: |
          set -euo pipefail

          artifact_name="weighttracker-${GITHUB_REF_NAME}-${ARTIFACT_RUNTIME}.zip"
          publish_dir="${RUNNER_TEMP}/weighttracker-publish"

          dotnet publish ./src/WeightTracker.Web/WeightTracker.Web.csproj \
            --configuration Release \
            --runtime "${ARTIFACT_RUNTIME}" \
            --self-contained true \
            --output "${publish_dir}" \
            /p:PublishSingleFile=false

          mkdir -p artifacts
          (cd "${publish_dir}" && zip -r "${GITHUB_WORKSPACE}/artifacts/${artifact_name}" .)
          echo "ARTIFACT_NAME=${artifact_name}" >> "${GITHUB_ENV}"
          echo "ARTIFACT_PATH=artifacts/${artifact_name}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker.io/${{ env.IMAGE_NAME }}:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_DIGEST: ${{ steps.build-and-push.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${IMAGE_DIGEST}" ]]; then
            echo "Docker build did not return an image digest."
            exit 1
          fi

          release_notes=$(printf 'Docker image: `%s`\n\nDocker digest: `%s`\n\n`%s` was also updated.\n\nRelease artifact: `%s`' \
            "docker.io/${IMAGE_NAME}:${GITHUB_REF_NAME}" \
            "${IMAGE_DIGEST}" \
            "docker.io/${IMAGE_NAME}:latest" \
            "${ARTIFACT_NAME}")

          gh release create "${GITHUB_REF_NAME}" "${ARTIFACT_PATH}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${release_notes}" \
            --generate-notes \
            --verify-tag
